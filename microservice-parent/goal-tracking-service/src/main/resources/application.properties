spring.application.name=goal-tracking-service
server.port=8087

# include credentials + authSource so auth succeeds
spring.data.mongodb.uri=mongodb://rootadmin:password@localhost:27018/goal-tracking-service?authSource=admin

management.endpoints.web.exposure.include=health,info

wellness.base-url=${WELLNESS_BASE_URL:http://localhost:8085}

goal-service.version=v1.0

springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/api-docs

# Connect to broker INSIDE Docker network
spring.kafka.bootstrap-servers=broker:29092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
#spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.json.KafkaJsonSchemaSerializer

#spring.kafka.properties.schema.registry.url=http://schema-registry:8081

#spring.kafka.properties.auto.register.schemas=true
#spring.kafka.properties.use.latest.version=true


#spring.kafka.bootstrap-servers=broker:9092
spring.kafka.template.default-topic=goal-completed
#spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
#spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
